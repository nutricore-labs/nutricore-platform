name: Repository Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  markdown-checks:
    name: Markdown and repository structure checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f README.md
          test -f CONTRIBUTING.md
          test -d docs
          test -d docs/architecture
          test -d docs/adr
          test -d docs/security
          test -d docs/development

      - name: Check required documentation
        run: |
          test -f docs/roadmap.md
          test -f docs/architecture/overview.md
          test -f docs/architecture/service-map.md
          test -f docs/security/security-model.md
          test -f docs/development/local-development.md
          test -f docs/adr/0001-use-platform-oriented-repository-structure.md
          test -f docs/adr/0002-start-with-modular-boundaries.md

      - name: Check Markdown files are not empty
        run: |
          find . -name "*.md" -not -path "./.git/*" -print0 | while IFS= read -r -d '' file; do
            if [ ! -s "$file" ]; then
              echo "Markdown file is empty: $file"
              exit 1
            fi
          done
